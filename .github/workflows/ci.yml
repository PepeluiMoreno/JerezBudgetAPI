name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Linting y formato ───────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.8.0

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ── Tests unitarios (sin base de datos) ────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mdbtools (necesario para imports)
        run: sudo apt-get install -y mdbtools

      - name: Install dependencies
        run: |
          pip install poetry==1.8.4
          poetry install --no-root

      - name: Run unit tests
        run: |
          poetry run pytest tests/ \
            -v \
            --tb=short \
            --color=yes \
            --ignore=tests/test_graphql.py \
            -k "not integration"
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost/test"
          REDIS_URL: "redis://localhost:6379/0"

  # ── Tests de integración (con PostgreSQL) ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jerezbudget_test
          POSTGRES_USER: jerezbudget
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mdbtools
        run: sudo apt-get install -y mdbtools

      - name: Install dependencies
        run: |
          pip install poetry==1.8.4
          poetry install --no-root

      - name: Apply migrations
        run: poetry run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://jerezbudget:testpass@localhost:5432/jerezbudget_test

      - name: Run all tests
        run: |
          poetry run pytest tests/ \
            -v \
            --tb=short \
            --color=yes \
            --cov=app \
            --cov=models \
            --cov=graphql \
            --cov=api \
            --cov=etl \
            --cov=services \
            --cov-report=term-missing \
            --cov-fail-under=60
        env:
          DATABASE_URL: postgresql+asyncpg://jerezbudget:testpass@localhost:5432/jerezbudget_test
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin

  # ── Build Docker ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sin push — solo verificar que compila)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: jerezbudget-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
