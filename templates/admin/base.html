<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JerezBudget Admin{% endblock %}</title>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <!-- HTMX method override (para PUT/DELETE desde forms) -->
  <script src="https://unpkg.com/htmx.org/dist/ext/method-override.js"></script>

  <style>
    /* ── Reset & base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-alt: #1c2128;
      --border:      #30363d;
      --border-light:#21262d;
      --accent:      #00b894;
      --accent-dim:  #00b89422;
      --warn:        #f59e0b;
      --warn-dim:    #f59e0b22;
      --danger:      #ef4444;
      --danger-dim:  #ef444422;
      --info:        #3b82f6;
      --info-dim:    #3b82f622;
      --text:        #c9d1d9;
      --text-muted:  #6e7681;
      --text-dim:    #8b949e;
      --radius:      6px;
      --mono:        "JetBrains Mono", "Fira Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app-layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 0;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-brand {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .logo {
      font-size: 13px;
      font-weight: 800;
      color: var(--accent);
      font-family: var(--mono);
      letter-spacing: -0.02em;
    }
    .sidebar-brand .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-section {
      padding: 12px 8px 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-left: 16px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .sidebar-link:hover { background: var(--surface-alt); color: var(--text); }
    .sidebar-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--accent-dim);
      font-weight: 600;
    }

    .sidebar-year-list {
      padding: 4px 0;
      max-height: 280px;
      overflow-y: auto;
    }

    .main-content { flex: 1; overflow-x: hidden; }

    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .page-header h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .page-header .breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .page-body { padding: 24px 28px; }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .card-body { padding: 18px; }

    /* ── Reconciliation panel ───────────────────────────────────── */
    .recon-panel {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .recon-stat {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .recon-stat .label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .recon-stat .value {
      font-size: 20px;
      font-weight: 800;
      font-family: var(--mono);
      color: var(--text);
    }
    .recon-stat .value.balanced { color: var(--accent); }
    .recon-stat .value.warning  { color: var(--warn); }
    .recon-stat .value.danger   { color: var(--danger); }
    .recon-stat .sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .recon-bar {
      height: 8px;
      background: var(--surface-alt);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }
    .recon-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .recon-bar-fill.danger { background: var(--danger); }
    .recon-bar-fill.warning { background: var(--warn); }

    .recon-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .recon-badge.balanced { background: var(--accent-dim); color: var(--accent); }
    .recon-badge.unbalanced { background: var(--warn-dim); color: var(--warn); }

    /* ── Table ───────────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table th {
      background: var(--surface-alt);
      padding: 8px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface-alt); }
    .data-table .mono { font-family: var(--mono); font-size: 12px; }
    .data-table .amount { text-align: right; font-family: var(--mono); }

    /* ── Badges ──────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-approved   { background: var(--accent-dim);  color: var(--accent); }
    .badge-progress   { background: var(--warn-dim);    color: var(--warn); }
    .badge-rejected   { background: var(--danger-dim);  color: var(--danger); }
    .badge-transfer   { background: var(--info-dim);    color: var(--info); }
    .badge-generate   { background: #a78bfa22;          color: #a78bfa; }
    .badge-carry      { background: #ec489922;          color: #ec4899; }
    .badge-ext        { background: var(--warn-dim);    color: var(--warn); }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--surface-alt); color: var(--text); }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border-color: var(--danger-dim);
    }
    .btn-danger:hover { background: var(--danger-dim); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 5px 8px; }

    /* ── Form ────────────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-grid .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-label .required { color: var(--danger); margin-left: 2px; }
    .form-control {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px;
      width: 100%;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 72px; }

    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
      margin-top: 4px;
    }

    /* ── Modal / Slide-in ────────────────────────────────────────── */
    .drawer-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: flex;
      justify-content: flex-end;
    }
    .drawer {
      background: var(--surface);
      border-left: 1px solid var(--border);
      width: 480px;
      max-width: 95vw;
      height: 100%;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .drawer-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Alerts ──────────────────────────────────────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      border: 1px solid transparent;
    }
    .alert-success { background: var(--accent-dim);  color: var(--accent);  border-color: var(--accent); }
    .alert-warning { background: var(--warn-dim);    color: var(--warn);    border-color: var(--warn); }
    .alert-danger  { background: var(--danger-dim);  color: var(--danger);  border-color: var(--danger); }
    .alert-info    { background: var(--info-dim);    color: var(--info);    border-color: var(--info); }

    /* ── Chapter breakdown table ─────────────────────────────────── */
    .chapter-grid {
      display: grid;
      grid-template-columns: 40px 1fr 130px 130px 110px 80px;
      gap: 0;
      font-size: 12px;
    }
    .chapter-grid .ch-head {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 6px 8px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
    }
    .chapter-grid .ch-cell {
      padding: 8px 8px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
    }
    .chapter-grid .ch-cell.right { justify-content: flex-end; font-family: var(--mono); }
    .chapter-grid .ch-cell.center { justify-content: center; }

    /* ── HTMX loading indicator ──────────────────────────────────── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-flex; }
    .htmx-request.htmx-indicator { display: inline-flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc ────────────────────────────────────────────────────── */
    .tag-prorroga {
      background: var(--warn-dim);
      color: var(--warn);
      border: 1px solid var(--warn);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface-alt);
      padding: 1px 5px;
      border-radius: 3px;
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body hx-ext="method-override">
<div class="app-layout">

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">JerezBudget</div>
      <div class="subtitle">Panel de administración</div>
    </div>

    <div class="sidebar-section">Presupuesto</div>

    <div class="sidebar-year-list">
      {% for y in all_years | reverse %}
      <a href="/admin/modificaciones/{{ y }}"
         class="sidebar-link {% if y == year %}active{% endif %}">
        <span>{{ y }}</span>
        {% if y == 2026 %}<span class="tag-prorroga">PRG</span>{% endif %}
      </a>
      {% endfor %}
    </div>

    <div class="sidebar-section" style="margin-top: auto; padding-top: 20px;">Sistema</div>
    <a href="/graphql" class="sidebar-link" target="_blank">GraphiQL →</a>
    <a href="/health" class="sidebar-link" target="_blank">Health check</a>
    <a href="/docs" class="sidebar-link" target="_blank">API Docs</a>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <div class="main-content">
    {% block header %}{% endblock %}
    <div class="page-body">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>

<div id="drawer-container"></div>

<script>
  // Cerrar drawer al hacer click en el backdrop
  document.body.addEventListener("click", function(e) {
    if (e.target.classList.contains("drawer-backdrop")) {
      document.getElementById("drawer-container").innerHTML = "";
    }
  });

  // Cerrar drawer con Escape
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      document.getElementById("drawer-container").innerHTML = "";
    }
  });

  // Scroll al tope de la tabla tras actualización HTMX
  document.body.addEventListener("htmx:afterSwap", function(e) {
    if (e.detail.target.id === "modifications-table-container") {
      document.getElementById("drawer-container").innerHTML = "";
    }
  });
</script>
</body>
</html>
