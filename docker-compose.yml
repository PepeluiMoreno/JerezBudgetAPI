services:

  # ── Base de datos ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: citydashboard_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-citydashboard_db}
      POSTGRES_USER: ${DB_USER:-citydashboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "54322:5432"                  # sólo dev — quitar en producción
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-citydashboard} -d ${DB_NAME:-citydashboard_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Broker / Cache ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: citydashboard_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5

  # ── Almacenamiento de ficheros fuente (S3-compatible) ───────────
  minio:
    image: minio/minio:latest
    container_name: citydashboard_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  # ── API GraphQL ─────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: citydashboard_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8015 --workers 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-citydashboard}:${DB_PASSWORD}@db/${DB_NAME:-citydashboard_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8015:8015"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app                        # hot-reload en dev; quitar en producción

  # ── Worker Celery (ETL + métricas) ──────────────────────────────
  worker:
    build:
      context: .
      target: runtime
    container_name: citydashboard_worker
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info -Q etl,metrics -c 4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-citydashboard}:${DB_PASSWORD}@db/${DB_NAME:-citydashboard_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (scheduler) ─────────────────────────────────────
  beat:
    build:
      context: .
      target: runtime
    container_name: citydashboard_beat
    restart: unless-stopped
    command: celery -A tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis

  # ── Frontend Vue 3 (SPA) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: citydashboard_frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

  # ── Flower (monitor Celery) ─────────────────────────────────────
  flower:
    image: mher/flower:1.2
    container_name: citydashboard_flower
    restart: unless-stopped
    command: celery flower --port=5555
    environment:
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  pg_data:
  redis_data:
  minio_data:
