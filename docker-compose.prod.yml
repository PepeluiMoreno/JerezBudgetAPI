# docker-compose.prod.yml
# Override de producción. Usar con:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Qué cambia respecto al base:
#   - Todos los puertos internos cerrados (solo Traefik expone)
#   - Labels Traefik para routing HTTPS
#   - Límites de recursos (CPU/RAM)
#   - Restart policy: always
#   - Sin volumen de hot-reload en api/dashboard
#   - Workers Celery con más concurrencia

services:

  db:
    restart: always
    ports: []         # no exponer PostgreSQL al host en producción
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    ports: []
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    restart: always
    ports: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  api:
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports: []
    volumes: []       # sin hot-reload en producción
    labels:
      - "traefik.enable=true"
      # API principal (GraphQL + OLAP + Admin)
      - "traefik.http.routers.api.rule=Host(`budget.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.api-http.rule=Host(`budget.${DOMAIN}`)"
      - "traefik.http.routers.api-http.entrypoints=web"
      - "traefik.http.routers.api-http.middlewares=redirect-https"
    deploy:
      resources:
        limits:
          memory: 512M

  dashboard:
    restart: always
    ports: []
    volumes: []
    environment:
      DASH_DEBUG: "false"
      BABBAGE_BASE_URL: http://api:8000/api/3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`presupuestos.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8050"
      - "traefik.http.routers.dashboard-http.rule=Host(`presupuestos.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-http.entrypoints=web"
      - "traefik.http.routers.dashboard-http.middlewares=redirect-https"
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    restart: always
    command: celery -A tasks.celery_app worker --loglevel=warning -Q etl,metrics -c 4
    deploy:
      resources:
        limits:
          memory: 512M

  beat:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  flower:
    restart: always
    ports: []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      # Flower protegido con BasicAuth en producción
      - "traefik.http.routers.flower.middlewares=flower-auth"
      - "traefik.http.middlewares.flower-auth.basicauth.users=${FLOWER_AUTH}"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Traefik reverse proxy ────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: jerezbudget_traefik
    restart: always
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=WARNING"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    labels:
      # Middleware global: redirect HTTP → HTTPS
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

volumes:
  letsencrypt:
